<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code and Barcode Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>
</head>
<body>
    <h1>QR Code and Barcode Scanner</h1>
    <div id="interactive" class="viewport">
        <video autoplay="true" muted="true" playsinline="true"></video>
    </div>
    <div id="result"></div>

    <script>
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector("#interactive"),
            },
            decoder: {
                readers: ["code_128_reader", "ean_reader", "ean_8_reader", "qrcode_reader"],
            },
        }, function(err) {
            if (err) {
                console.error(err);
                return;
            }
            console.log("Initialization finished. Starting Quagga...");
            Quagga.start();
        });

        Quagga.onDetected((result) => {
            const code = result.codeResult.code;
            document.getElementById("result").innerText = `Scanned: ${code}`;
        });
    </script>
</body>
</html>
